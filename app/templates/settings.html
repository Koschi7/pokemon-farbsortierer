{% extends "base.html" %}

{% block content %}
<header class="header">
    <h1 class="logo">{{ t.settings_title }}</h1>
</header>

<main class="settings-page">
    <form method="post" action="/settings" class="settings-form">
        <h2>{{ t.settings_gen_title }}</h2>
        <p class="settings-hint">{{ t.settings_gen_hint }}</p>

        <div class="gen-checkboxes">
            {% for gen in all_generations %}
            <label class="gen-label">
                <input
                    type="checkbox"
                    name="gen_{{ gen }}"
                    {% if gen in active_generations %}checked{% endif %}
                >
                <span class="gen-box">Generation {{ gen }}</span>
            </label>
            {% endfor %}
        </div>

        <h2>{{ t.settings_lang_title }}</h2>
        <div class="lang-toggle">
            <label class="lang-option">
                <input type="radio" name="language" value="de" {% if lang == 'de' %}checked{% endif %}>
                <span class="lang-box">Deutsch</span>
            </label>
            <label class="lang-option">
                <input type="radio" name="language" value="en" {% if lang == 'en' %}checked{% endif %}>
                <span class="lang-box">English</span>
            </label>
        </div>

        <button type="submit" class="settings-btn save-btn">{{ t.settings_save }}</button>
    </form>

    <div id="seed-status"
         hx-get="/settings/seed-status"
         hx-trigger="load"
         hx-swap="outerHTML">
    </div>

    <form method="post" action="/settings/seed" class="settings-form"
          hx-post="/settings/seed" hx-target="#seed-status" hx-swap="outerHTML">
        <h2>{{ t.settings_seed_title }}</h2>
        <p class="settings-hint">{{ t.settings_seed_hint }}</p>
        <button type="submit" id="seed-btn" class="settings-btn seed-btn">{{ t.settings_seed_btn }}</button>
    </form>

    <a href="/" class="settings-btn back-btn">{{ t.settings_back }}</a>
</main>
{% endblock %}
