{% extends "base.html" %}
{% from "partials/type_icons.html" import type_icon %}

{% block content %}
<div class="sticky-top">
    <header class="header">
        <h1 class="logo" id="app-logo">{{ t.app_title }}</h1>
        <div class="mode-toggle">
            <button class="mode-btn" data-mode="color" onclick="switchMode('color')">{{ t.mode_color }}</button>
            <button class="mode-btn active" data-mode="type" onclick="switchMode('type')">{{ t.mode_type }}</button>
            <button class="mode-btn mode-icon" data-mode="search" onclick="switchMode('search')"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="mode-btn mode-icon" data-mode="favorites"
                    hx-get="/pokemon?filter=favorites"
                    hx-target="#pokemon-grid"
                    hx-swap="innerHTML"
                    onclick="switchMode('favorites')"><i class="fa-solid fa-heart"></i></button>
        </div>
    </header>

    <nav class="filter-nav">
    <div class="filter-scroll hidden" id="color-filters">
        {% for key, label in colors.items() %}
        <button
            class="filter-btn color-btn color-{{ key }}"
            hx-get="/pokemon?filter=color&value={{ key }}"
            hx-target="#pokemon-grid"
            hx-swap="innerHTML"
            onclick="setActive(this)"
        >
            {{ label }}
        </button>
        {% endfor %}
    </div>

    <div class="filter-scroll" id="type-filters">
        {% for key, label in types.items() %}
        <button
            class="filter-btn type-btn type-{{ key }}"
            hx-get="/pokemon?filter=type&value={{ key }}"
            hx-target="#pokemon-grid"
            hx-swap="innerHTML"
            onclick="setActive(this)"
        >
            {{ type_icon(key, "32") }}
        </button>
        {% endfor %}
    </div>

    <div class="search-bar hidden" id="search-bar">
        <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="{{ t.mode_search }}…"
            autocomplete="off"
            hx-get="/pokemon?filter=search"
            hx-target="#pokemon-grid"
            hx-swap="innerHTML"
            hx-trigger="keyup changed delay:300ms"
            hx-include="this"
            name="q"
        >
    </div>
</nav>
</div>

<main>
    <div id="pokemon-grid" class="pokemon-grid">
        <p class="hint">{{ t.hint_default }}</p>
    </div>
</main>

<div id="detail-overlay" class="detail-overlay hidden" onclick="closeDetail(event)">
    <div id="detail-content" class="detail-content"></div>
</div>

<script>
    window.APP_LANG = "{{ lang }}";
    window.APP_HINTS = {
        default: "{{ t.hint_default }}",
        search: "{{ t.hint_search }}"
    };
</script>
{% endblock %}
